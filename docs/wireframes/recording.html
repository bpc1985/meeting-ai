<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting AI — Recording</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #090D1A;
    --bg-base: #0F1525;
    --bg-elevated: #161E33;
    --bg-hover: #1C2540;
    --text-primary: #EDF0F5;
    --text-secondary: #8B92A5;
    --text-tertiary: #5B6378;
    --accent: #22D3EE;
    --accent-muted: rgba(34, 211, 238, 0.10);
    --border-default: rgba(139, 146, 165, 0.12);
    --border-emphasis: rgba(139, 146, 165, 0.24);
    --recording: #EF4444;
    --recording-glow: rgba(239, 68, 68, 0.3);
    --success: #22C55E;
    --error: #EF4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Lexend', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar (same as meeting-list) */
  .sidebar {
    width: 256px; min-width: 256px;
    background: var(--bg-deep);
    border-right: 1px solid var(--border-default);
    display: flex; flex-direction: column; height: 100vh;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; margin: 2px 8px; border-radius: 8px;
    color: var(--text-secondary); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 150ms ease-out;
    border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .nav-item.active {
    background: var(--accent-muted); color: var(--accent);
    border-left-color: var(--accent); border-radius: 0 8px 8px 0;
    margin-left: 0; padding-left: 14px;
  }
  .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Recording Header */
  .rec-header {
    height: 56px; min-height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid var(--border-default);
  }
  .btn-back {
    background: none; border: none; color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-family: 'Lexend', sans-serif; font-size: 14px; font-weight: 500;
    transition: color 150ms;
  }
  .btn-back:hover { color: var(--text-primary); }
  .btn-back svg { width: 18px; height: 18px; }

  /* Recording Content */
  .rec-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 32px; gap: 32px;
  }

  /* Recording Indicator (pulsing) */
  .rec-indicator {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 20px; border-radius: 9999px;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
  }
  .rec-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--recording);
    box-shadow: 0 0 20px var(--recording-glow);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px var(--recording-glow); }
    50% { opacity: 0.4; transform: scale(0.85); box-shadow: 0 0 8px var(--recording-glow); }
  }
  .rec-label {
    font-size: 12px; font-weight: 700; color: var(--recording);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  /* Duration Counter */
  .duration {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 72px; font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .duration-millis {
    font-size: 36px;
    color: var(--text-tertiary);
    font-weight: 400;
  }

  /* Waveform */
  .waveform {
    display: flex; align-items: flex-end; gap: 3px;
    height: 120px; width: 100%; max-width: 600px;
  }
  .waveform-bar {
    flex: 1; border-radius: 9999px;
    background: var(--accent);
    opacity: 0.8;
    animation: wave-anim 0.8s ease-in-out infinite alternate;
  }
  @keyframes wave-anim {
    0% { opacity: 0.3; background: var(--accent); }
    100% { opacity: 1; background: #3DD9F1; }
  }
  .waveform-bar.paused { animation-play-state: paused; opacity: 0.5; }

  /* Mic Level Meter */
  .mic-meter {
    display: flex; align-items: center; gap: 12px;
    padding: 0 24px;
  }
  .mic-meter-label {
    font-size: 12px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .mic-level-bar {
    width: 160px; height: 4px; border-radius: 2px;
    background: var(--border-emphasis); overflow: hidden;
  }
  .mic-level-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--success) 0%, var(--success) 70%, var(--warning) 85%, var(--recording) 100%);
    animation: level-anim 0.3s ease-out infinite alternate;
    width: 65%;
  }
  @keyframes level-anim {
    0% { width: 55%; }
    100% { width: 78%; }
  }

  /* Controls */
  .rec-controls {
    display: flex; align-items: center; gap: 24px;
    margin-top: 24px;
  }
  .btn-control {
    width: 56px; height: 56px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 150ms ease-out;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
  }
  .btn-control:hover { background: var(--bg-hover); border-color: var(--border-emphasis); }
  .btn-control:active { transform: scale(0.95); }
  .btn-control svg { width: 22px; height: 22px; }

  .btn-stop {
    width: 72px; height: 72px;
    background: var(--recording);
    border: none; color: white;
    box-shadow: 0 0 30px var(--recording-glow);
  }
  .btn-stop:hover { background: #F05252; box-shadow: 0 0 40px rgba(239, 68, 68, 0.45); }
  .btn-stop svg { width: 28px; height: 28px; }

  .btn-pause {
    width: 64px; height: 64px;
    background: var(--bg-elevated);
    border: 2px solid var(--text-secondary);
  }
  .btn-pause:hover { border-color: var(--text-primary); }

  /* Recording Info */
  .rec-info {
    display: flex; gap: 32px;
    font-size: 13px; color: var(--text-tertiary);
  }
  .rec-info-item {
    display: flex; align-items: center; gap: 6px;
  }
  .rec-info-item span:first-child { color: var(--text-secondary); font-weight: 500; }

  /* Privacy Badge */
  .privacy-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; margin: 0 8px 16px; border-radius: 8px;
    background: rgba(34, 197, 94, 0.06); color: var(--success);
    font-size: 12px; font-weight: 500;
  }
  .privacy-badge svg { width: 16px; height: 16px; flex-shrink: 0; }

  @media (prefers-reduced-motion) {
    .rec-dot { animation: none; opacity: 1; }
    .waveform-bar { animation: none; opacity: 0.8; }
    .mic-level-fill { animation: none; width: 65%; }
    .btn-control { transition: none; }
    .btn-control:active { transform: none; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div style="display:flex;align-items:center;gap:12px;padding:20px 16px;">
    <div style="width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#090D1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </div>
    <span style="font-size:18px;font-weight:700;color:var(--text-primary);">Meeting AI</span>
  </div>
  <nav style="flex:1;padding-top:8px;">
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      All Meetings
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      New Recording
    </div>
  </nav>
  <div style="padding:0 8px 8px;">
    <div class="privacy-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Recording locally
    </div>
    <div style="padding:8px 16px;font-size:11px;color:var(--text-tertiary);">v0.1.0</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- Header -->
  <header class="rec-header">
    <button class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back to meetings
    </button>
    <div style="display:flex;align-items:center;gap:8px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/></svg>
      <span style="font-size:13px;color:var(--text-tertiary);">Built-in Microphone</span>
    </div>
  </header>

  <!-- Recording Content -->
  <div class="rec-content">

    <!-- Recording Indicator -->
    <div class="rec-indicator">
      <div class="rec-dot"></div>
      <span class="rec-label">Recording</span>
    </div>

    <!-- Duration -->
    <div class="duration">00:12<span class="duration-millis">.48</span></div>

    <!-- Waveform -->
    <div class="waveform" id="waveform">
      <!-- Generated by JS -->
    </div>

    <!-- Mic Level -->
    <div class="mic-meter">
      <span class="mic-meter-label">Mic Level</span>
      <div class="mic-level-bar">
        <div class="mic-level-fill"></div>
      </div>
    </div>

    <!-- Recording Info -->
    <div class="rec-info">
      <div class="rec-info-item">
        <span>Provider:</span> OpenAI Whisper
      </div>
      <div class="rec-info-item">
        <span>Format:</span> 16-bit PCM · 44.1 kHz · Mono
      </div>
      <div class="rec-info-item">
        <span>File size:</span> 3.2 MB
      </div>
    </div>

    <!-- Controls -->
    <div class="rec-controls">
      <button class="btn-control" title="Mute microphone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="btn-stop" title="Stop recording">
        <svg viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
      <button class="btn-pause" title="Pause recording">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
    </div>

  </div>
</main>

<script>
  // Generate waveform bars
  const waveform = document.getElementById('waveform');
  const barCount = 48;
  for (let i = 0; i < barCount; i++) {
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    // Random height between 10% and 100% of container
    const height = 15 + Math.random() * 85;
    bar.style.height = height + '%';
    // Stagger animation
    bar.style.animationDelay = (i * 0.04) + 's';
    bar.style.animationDuration = (0.4 + Math.random() * 0.6) + 's';
    waveform.appendChild(bar);
  }
</script>

</body>
</html>
