<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <!-- Deep navy background -->
  <rect width="512" height="512" rx="96" fill="#090D1A"/>
  <!-- Geometric M formed by overlapping rounded speech nodes -->
  <!-- Left node -->
  <rect x="112" y="140" width="88" height="232" rx="24" fill="url(#g)" opacity="0.95"/>
  <!-- Right descending node -->
  <rect x="312" y="140" width="88" height="232" rx="24" fill="url(#g)" opacity="0.85"/>
  <!-- Center ascending node (the apex of the M) -->
  <rect x="212" y="140" width="88" height="160" rx="24" fill="url(#g)" opacity="1"/>
  <!-- Subtle connection nodes -->
  <circle cx="144" cy="280" r="8" fill="#090D1A" opacity="0.4"/>
  <circle cx="368" cy="280" r="8" fill="#090D1A" opacity="0.4"/>
</svg>
